version: 2

models:
  - name: int_trips_enriched
    description: |
      Core enriched trips spine model.
      Joins trips with city context and calculates trip duration and surge breakdown.
      This is the single source of truth for trip-level data used by all downstream
      intermediate models and marts.
      
      Upstream: stg_trips, stg_cities
      Downstream: int_trips_revenue, int_trips_flagged, fct_trips, fct_revenue
    
    columns:
      - name: trip_id
        description: Unique trip identifier
        tests:
          - not_null
          - unique

      - name: city_name
        description: |
          Human-readable city name joined from stg_cities.
          Null if city_id has no matching record in stg_cities.

      - name: trip_duration_minutes
        description: |
          Minutes between pickup and dropoff.
          Only populated for completed trips where dropoff_at > pickup_at.
          Null for cancelled, no_show, or trips with bad timestamps.
        tests:
          - not_null:
              config:
                where: "status = 'completed' and pickup_at is not null and dropoff_at is not null"

      - name: is_surge
        description: True when surge_multiplier is greater than 1.0.
        tests:
          - not_null

      - name: base_fare
        description: |
          Estimated fare without surge applied.
          Calculated as actual_fare divided by surge_multiplier.
          Null if surge_multiplier is 0.

      - name: surge_revenue_impact
        description: |
          Extra revenue generated by surge on this trip.
          Calculated as actual_fare minus base_fare.
          Zero for non-surge trips.
  - name: int_surge_thresholds
    description: |
      Single-row table containing surge multiplier percentile thresholds.
      Computed once from stg_trips to avoid repeated full table scans.
      Cross joined into int_trips_flagged for fraud detection.
    
    columns:
      - name: p95_surge
        description: 95th percentile of surge_multiplier across all trips.
        tests:
          - not_null
      - name: p99_surge
        description: 99th percentile of surge_multiplier across all trips.
        tests:
          - not_null
  - name: int_trips_flagged
    description: |
      Adds fraud detection flags to each trip.
      Five independent yes/no checks are applied per trip.
      fraud_signal_score sums the flags and risk_tier labels the result.

      Upstream: int_trips_enriched, stg_payments, int_surge_thresholds
      Downstream: fct_trips, mart_fraud_insights

    columns:
      - name: trip_id
        description: Unique trip identifier
        tests:
          - not_null
          - unique

      - name: fraud_signal_score
        description: |
          Number of fraud flags that fired on this trip.
          0 = clean, 1 = low, 2 = medium, 3 or more = high.
        tests:
          - not_null

      - name: risk_tier
        description: Human readable fraud risk level based on fraud_signal_score.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['clean', 'low', 'medium', 'high']
  