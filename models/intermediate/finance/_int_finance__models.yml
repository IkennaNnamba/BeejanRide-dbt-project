version: 2

models:
  - name: int_trips_revenue
    description: |
      Trip-level revenue model. Joins int_trips_enriched with payment data
      to produce gross revenue, net revenue, payment fees, and revenue type.
      
      Key concept: net_revenue is only populated when payment_status = 'success'.
      Use is_revenue_realised = true to filter to actually collected revenue.
      
      Upstream: int_trips_enriched, stg_payments
      Downstream: int_revenue_splits, fct_revenue, mart_city_revenue

    columns:
      - name: trip_id
        description: Unique trip identifier
        tests:
          - not_null
          - unique

      - name: revenue_type
        description: Either 'corporate' or 'personal'. Derived from is_corporate flag.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['corporate', 'personal']

      - name: payment_availability
        description: |
          Describes the payment situation for this trip.
          no_payment_record = no payment row exists (cancelled/no_show trips)
          payment_failed    = payment was attempted but failed
          payment_success   = payment completed successfully
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['no_payment_record', 'payment_failed', 'payment_success']

      - name: gross_revenue
        description: |
          The actual_fare charged to the rider.
          Exists for all trips regardless of payment outcome.

      - name: net_revenue
        description: |
          gross_revenue minus payment_fee.
          Only populated when payment_status = 'success'.
          Zero for failed or missing payments.

      - name: is_revenue_realised
        description: |
          True only when trip status is completed AND payment status is success.
          Use this flag to filter to actually collected revenue in all marts.
        tests:
          - not_null

      - name: surge_revenue_impact
        description: Extra revenue generated by surge pricing on this trip.